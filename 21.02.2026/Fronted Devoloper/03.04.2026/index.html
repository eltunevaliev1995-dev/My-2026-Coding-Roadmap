<!DOCTYPE html>
<html lang="en">
<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Modern Budget Calculator</title>
          <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
          <link rel="stylesheet" href="style.css">
</head>
<body>
        
        <div class="budget-card">

                   <h2><i class="fas fa-wallet"></i>Budget Analysis</h2>

            <div class="input-section">

                    <label for="income"><i class="fas fa-money-bill-wave"></i>Total Income</label>
                    <input type="number" id="incomeInput" placeholder="e.g. 1500 USD">

                    <label for="expence"><i class="fas fa-shopping-cart"></i>Total Expense</label>
                    <input type="number" id="expenseInput" placeholder="e.g. 800 USD">

            </div>

            <button id="calculateBtn">

                    Calculate <i class="fas fa-calculator"></i>

            </button>


            <button class="reset-btn" id="resetBtn">

                Reset <i class="fas fa-redo"></i>
  
            </button>


            <div id="resultBox" class="result-box">
              
               Enter the data and press calculate.

            </div>

        </div> 

<script src="march.js"></script>
</body>
</html>
