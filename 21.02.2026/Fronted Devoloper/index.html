<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Tracker</title>
</head>
<body>
   


      <div class="budget-card">
        <h2>My Budget Tracker</h2>
      
        <label>Total Income (Gəlir):</label>
        <input type="number" id="income" placeholder="e.g. 1500">
      
        <label>Total Expense (Xərc):</label>
        <input type="number" id="expense" placeholder="e.g. 800">
      
        <button id="calc-btn">Calculate Balance</button>
      
        <div class="result-box">
          <h3>Remaining Balance: <span id="final-balance">0</span> AZN</h3>
          <p id="status-msg"></p>
        </div>
      </div>



<script src="script.js"></script>
</body>
</html>
