<!DOCTYPE html>
<html lang="en">
<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Mini E-Commerce App</title>
          <link rel="stylesheet" href="style.css">
</head>
<body>
        <div class="card">

          <h1>🛒 Mini E-Commerce App</h1>
          
          <!-- Product price input - Məhsul qiyməti -->
          <div class="product">
          
                    <label for="price">Product Price ($):</label>
                    <input type="number" id="price" value="50">
          
          </div>
          
          <!-- Quantity input - Məhsul sayı -->
          <div class="product">
               

                    <!---First-->
                    <label for="quantity">Quantity:</label>
                    <input type="number" id="quantity" value="1">
          
          </div>
          
          <!-- Discount code input - Endirim kodu -->
          <div class="product">
                    <label for="discount">Discount Code</label>
                    <input type="text" id="discount" placeholder="Enter Code">
          </div>
          
          <!-- Calculate button - Hesablama düyməsi -->
          <button onclick="calculate()">Calculate</button>
          <!-- English: This creates a button labeled "Reset". 
          When clicked, it calls the reset() function. -->
          <!-- Azərbaycanca: Bu, "Reset" yazılı düymə yaradır. 
          Kliklənəndə reset() funksiyasını çağırır. -->
          <button id="reset" onclick="reset()">Reset</button>
          
          <!-- Result output - Nəticə -->
          <p id="result"></p>


        </div>


<script src="script.js"></script>          
</body>
</html>
