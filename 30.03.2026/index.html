<!DOCTYPE html>
<html lang="az">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🎰 Vegas Slot - Real Casino</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Roboto+Mono:wght@400;700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold: #ffd700;
      --gold-dark: #b8860b;
      --casino-red: #8b0000;
      --casino-dark: #1a0a0a;
      --neon-blue: #00d9ff;
      --neon-pink: #ff00ff;
    }

    body {
      font-family: 'Roboto Mono', monospace;
      background:
        radial-gradient(ellipse at top, #2d1b4e 0%, transparent 50%),
        radial-gradient(ellipse at bottom, #4a1c40 0%, transparent 50%),
        linear-gradient(180deg, #0d0221 0%, #1a0a2e 50%, #0d0221 100%);
      min-height: 100vh;
      color: white;
      overflow-x: hidden;
    }

    /* CRT Effect */
    .crt::before {
      content: " ";
      display: block;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
      background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      background-size: 100% 2px, 3px 100%;
      pointer-events: none;
      z-index: 1000;
    }

    /* Header */
    .casino-header {
      text-align: center;
      padding: 1rem;
      background: linear-gradient(180deg, rgba(0, 0, 0, 0.8), transparent);
      border-bottom: 3px solid var(--gold);
    }

    .casino-title {
      font-family: 'Cinzel', serif;
      font-size: 3rem;
      font-weight: 900;
      background: linear-gradient(180deg, #fff 0%, var(--gold) 50%, var(--gold-dark) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
      letter-spacing: 5px;
    }

    .casino-subtitle {
      color: var(--neon-blue);
      font-size: 0.9rem;
      letter-spacing: 8px;
      text-transform: uppercase;
      margin-top: 0.5rem;
      animation: flicker 2s infinite;
    }

    @keyframes flicker {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.8;
      }
    }

    /* Main Container */
    .game-wrapper {
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Credit Panel */
    .credit-panel {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .credit-display {
      flex: 1;
      min-width: 200px;
      background: linear-gradient(145deg, #000, #1a1a1a);
      border: 3px solid var(--gold);
      border-radius: 15px;
      padding: 1rem;
      text-align: center;
      box-shadow:
        0 0 20px rgba(255, 215, 0, 0.2),
        inset 0 2px 10px rgba(255, 255, 255, 0.1);
    }

    .credit-label {
      font-size: 0.8rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 0.5rem;
    }

    .credit-value {
      font-family: 'Roboto Mono', monospace;
      font-size: 2.5rem;
      font-weight: 700;
      color: var(--gold);
      text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
    }

    .credit-value.win {
      animation: creditWin 0.5s ease;
      color: #00ff00;
    }

    @keyframes creditWin {
      0% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.2);
        color: #00ff00;
      }

      100% {
        transform: scale(1);
      }
    }

    /* Slot Machine Cabinet */
    .slot-cabinet {
      background: linear-gradient(145deg, #2a1810, #1a0f0a);
      border-radius: 30px;
      padding: 3rem 2rem;
      border: 8px solid;
      border-image: linear-gradient(180deg, var(--gold), #8b4513, var(--gold)) 1;
      box-shadow:
        0 30px 60px rgba(0, 0, 0, 0.8),
        inset 0 5px 20px rgba(0, 0, 0, 0.5),
        0 0 50px rgba(255, 215, 0, 0.1);
      position: relative;
    }

    .cabinet-light {
      position: absolute;
      top: -10px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--gold);
      color: #000;
      padding: 0.5rem 2rem;
      border-radius: 20px;
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: 1.2rem;
      box-shadow: 0 5px 20px rgba(255, 215, 0, 0.5);
    }

    /* Reel Window */
    .reel-window {
      background: #000;
      border-radius: 20px;
      padding: 2rem;
      border: 5px solid #333;
      box-shadow:
        inset 0 10px 30px rgba(0, 0, 0, 0.8),
        0 5px 20px rgba(255, 255, 255, 0.1);
      margin-bottom: 2rem;
      position: relative;
      overflow: hidden;
    }

    .payline-indicator {
      position: absolute;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent, #00ff00, transparent);
      opacity: 0;
      transition: opacity 0.3s;
      box-shadow: 0 0 20px #00ff00;
      z-index: 10;
    }

    .payline-indicator.active {
      opacity: 1;
      animation: paylineFlash 0.5s ease infinite;
    }

    @keyframes paylineFlash {

      0%,
      100% {
        opacity: 0.5;
      }

      50% {
        opacity: 1;
      }
    }

    .payline-indicator.top {
      top: 33%;
    }

    .payline-indicator.middle {
      top: 50%;
    }

    .payline-indicator.bottom {
      top: 67%;
    }

    .reels-container {
      display: flex;
      justify-content: center;
      gap: 1rem;
      perspective: 1000px;
    }

    .reel {
      width: 160px;
      height: 200px;
      background: linear-gradient(180deg, #fff 0%, #e0e0e0 50%, #fff 100%);
      border-radius: 15px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 10px 30px rgba(0, 0, 0, 0.5),
        inset 0 2px 5px rgba(255, 255, 255, 0.5);
      border: 3px solid #666;
    }

    .reel::before,
    .reel::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 40px;
      z-index: 5;
      pointer-events: none;
    }

    .reel::before {
      top: 0;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.4), transparent);
    }

    .reel::after {
      bottom: 0;
      background: linear-gradient(to top, rgba(0, 0, 0, 0.4), transparent);
    }

    .reel-strip {
      position: absolute;
      width: 100%;
      transition: transform 0.1s linear;
    }

    .symbol {
      width: 160px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 6rem;
      background: linear-gradient(180deg, #fff 0%, #f5f5f5 50%, #fff 100%);
      border-bottom: 2px solid rgba(0, 0, 0, 0.1);
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
    }

    .symbol.wild {
      background: linear-gradient(180deg, #ffd700 0%, #ffed4e 50%, #ffd700 100%);
      box-shadow: inset 0 0 30px rgba(255, 215, 0, 0.5);
    }

    .symbol.scatter {
      background: linear-gradient(180deg, #ff6b6b 0%, #ee5a24 50%, #ff6b6b 100%);
      animation: scatterPulse 2s infinite;
    }

    @keyframes scatterPulse {

      0%,
      100% {
        box-shadow: inset 0 0 20px rgba(255, 0, 0, 0.3);
      }

      50% {
        box-shadow: inset 0 0 40px rgba(255, 0, 0, 0.6);
      }
    }

    /* Control Panel */
    .control-panel {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 2rem;
      align-items: center;
    }

    .bet-section {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .bet-label {
      text-align: center;
      color: var(--gold);
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .bet-controls {
      display: flex;
      justify-content: center;
      gap: 1rem;
      align-items: center;
    }

    .bet-btn {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      border: 3px solid var(--gold);
      background: linear-gradient(145deg, #2a1810, #1a0f0a);
      color: var(--gold);
      font-size: 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bet-btn:hover:not(:disabled) {
      background: var(--gold);
      color: #000;
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
    }

    .bet-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .bet-amount {
      font-family: 'Roboto Mono', monospace;
      font-size: 2rem;
      color: #fff;
      min-width: 100px;
      text-align: center;
      background: rgba(0, 0, 0, 0.5);
      padding: 0.5rem 1rem;
      border-radius: 10px;
      border: 2px solid var(--gold);
    }

    /* Spin Button */
    .spin-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
    }

    .spin-btn {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      border: 8px solid var(--gold);
      background:
        radial-gradient(circle at 30% 30%, #ff6b6b, #dc143c),
        linear-gradient(180deg, #dc143c, #8b0000);
      color: white;
      font-family: 'Cinzel', serif;
      font-size: 2rem;
      font-weight: 900;
      cursor: pointer;
      position: relative;
      text-transform: uppercase;
      letter-spacing: 3px;
      box-shadow:
        0 15px 40px rgba(220, 20, 60, 0.5),
        inset 0 5px 20px rgba(255, 255, 255, 0.3),
        0 0 30px rgba(255, 0, 0, 0.3);
      transition: all 0.3s;
    }

    .spin-btn::before {
      content: '';
      position: absolute;
      top: -15px;
      left: -15px;
      right: -15px;
      bottom: -15px;
      border-radius: 50%;
      border: 4px solid rgba(255, 215, 0, 0.3);
      animation: spinRing 3s linear infinite;
    }

    @keyframes spinRing {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .spin-btn:hover:not(:disabled) {
      transform: scale(1.05);
      box-shadow:
        0 20px 50px rgba(220, 20, 60, 0.7),
        inset 0 5px 20px rgba(255, 255, 255, 0.5),
        0 0 50px rgba(255, 0, 0, 0.5);
    }

    .spin-btn:active:not(:disabled) {
      transform: scale(0.95);
    }

    .spin-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      filter: grayscale(0.5);
    }

    .spin-btn.spinning {
      animation: buttonSpin 0.5s linear infinite;
    }

    @keyframes buttonSpin {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    /* Quick Bet Buttons */
    .quick-bets {
      display: flex;
      gap: 0.5rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .quick-bet {
      padding: 0.5rem 1rem;
      background: rgba(255, 215, 0, 0.1);
      border: 2px solid var(--gold);
      color: var(--gold);
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
    }

    .quick-bet:hover,
    .quick-bet.active {
      background: var(--gold);
      color: #000;
    }

    /* Info Panel */
    .info-panel {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      font-size: 0.9rem;
    }

    .info-label {
      color: #888;
    }

    .info-value {
      color: var(--gold);
      font-weight: bold;
    }

    /* Win Display */
    .win-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
      animation: fadeIn 0.3s;
    }

    .win-overlay.show {
      display: flex;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    .win-display {
      text-align: center;
      animation: winZoom 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes winZoom {
      from {
        transform: scale(0) rotate(-10deg);
        opacity: 0;
      }

      to {
        transform: scale(1) rotate(0deg);
        opacity: 1;
      }
    }

    .win-title {
      font-family: 'Cinzel', serif;
      font-size: 4rem;
      color: var(--gold);
      text-shadow: 0 0 50px rgba(255, 215, 0, 0.8);
      margin-bottom: 1rem;
    }

    .win-amount {
      font-size: 6rem;
      font-weight: 900;
      background: linear-gradient(180deg, #fff, var(--gold), var(--gold-dark));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
      text-shadow: none;
      filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.5));
    }

    .win-multiplier {
      font-size: 2rem;
      color: var(--neon-blue);
      margin-bottom: 2rem;
    }

    .continue-btn {
      padding: 1rem 3rem;
      background: linear-gradient(145deg, var(--gold), var(--gold-dark));
      color: #000;
      border: none;
      border-radius: 50px;
      font-size: 1.3rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .continue-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 10px 30px rgba(255, 215, 0, 0.5);
    }

    /* Paytable Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1500;
    }

    .modal-overlay.show {
      display: flex;
    }

    .modal {
      background: linear-gradient(145deg, #2a1810, #1a0f0a);
      border: 3px solid var(--gold);
      border-radius: 20px;
      padding: 2rem;
      max-width: 600px;
      width: 90%;
      max-height: 80vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid rgba(255, 215, 0, 0.3);
    }

    .modal-title {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem;
      color: var(--gold);
    }

    .close-modal {
      background: none;
      border: none;
      color: #fff;
      font-size: 2rem;
      cursor: pointer;
    }

    .paytable-grid {
      display: grid;
      gap: 0.75rem;
    }

    .paytable-row {
      display: grid;
      grid-template-columns: 80px 1fr auto;
      align-items: center;
      padding: 0.75rem;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 10px;
      gap: 1rem;
    }

    .paytable-symbol {
      font-size: 2.5rem;
      text-align: center;
    }

    .paytable-name {
      color: #fff;
      font-weight: bold;
    }

    .paytable-odds {
      color: var(--gold);
      font-family: 'Roboto Mono', monospace;
      font-size: 1.1rem;
    }

    /* Action Buttons */
    .action-buttons {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
      flex-wrap: wrap;
    }

    .action-btn {
      padding: 0.75rem 1.5rem;
      background: rgba(255, 215, 0, 0.1);
      border: 2px solid var(--gold);
      color: var(--gold);
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .action-btn:hover {
      background: var(--gold);
      color: #000;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .casino-title {
        font-size: 2rem;
      }

      .reel {
        width: 100px;
        height: 130px;
      }

      .symbol {
        width: 100px;
        height: 130px;
        font-size: 4rem;
      }

      .spin-btn {
        width: 140px;
        height: 140px;
        font-size: 1.5rem;
      }

      .control-panel {
        grid-template-columns: 1fr;
        gap: 1rem;
      }

      .credit-panel {
        flex-direction: column;
      }
    }
  </style>
</head>

      WATERMELON: { id: 'W', emoji: '🍉', name: 'Melon', value: 15, weight: 10, type: 'medium' },
      GRAPE: { id: 'G', emoji: '🍇', name: 'Grape', value: 10, weight: 12, type: 'low' },
      ORANGE: { id: 'O', emoji: '🍊', name: 'Orange', value: 8, weight: 14, type: 'low' },
      LEMON: { id: 'L', emoji: '🍋', name: 'Lemon', value: 5, weight: 16, type: 'low' },
      CHERRY: { id: 'C', emoji: '🍒', name: 'Cherry', value: 3, weight: 18, type: 'low' },
      WILD: { id: 'WILD', emoji: '⭐', name: 'Wild', value: 0, weight: 3, type: 'special', isWild: true },
      SCATTER: { id: 'SCAT', emoji: '💰', name: 'Scatter', value: 0, weight: 2, type: 'special', isScatter: true, freeSpins: 10 }
    };

    // Reel strips (physical slot machine layout)
    const REEL_STRIPS = [
      ['CHERRY', 'LEMON', 'ORANGE', 'GRAPE', 'WATERMELON', 'BELL', 'BAR', 'DIAMOND', 'SEVEN', 'WILD', 'CHERRY', 'LEMON', 'ORANGE', 'SCATTER', 'GRAPE', 'BELL', 'BAR', 'WATERMELON', 'DIAMOND', 'SEVEN'],
      ['SEVEN', 'CHERRY', 'LEMON', 'ORANGE', 'GRAPE', 'WATERMELON', 'BELL', 'BAR', 'DIAMOND', 'CHERRY', 'WILD', 'LEMON', 'ORANGE', 'GRAPE', 'SCATTER', 'WATERMELON', 'BELL', 'BAR', 'DIAMOND', 'CHERRY'],
      ['DIAMOND', 'SEVEN', 'CHERRY', 'LEMON', 'ORANGE', 'GRAPE', 'WATERMELON', 'BELL', 'BAR', 'WILD', 'CHERRY', 'LEMON', 'ORANGE', 'GRAPE', 'WATERMELON', 'SCATTER', 'BELL', 'BAR', 'DIAMOND', 'SEVEN']
    ];

    // ==================== GAME STATE ====================

    const GameState = {
      balance: 1000,
      bet: 10,
      minBet: 10,
      maxBet: 1000,
      totalSpins: 0,
      totalWins: 0,
      lastWin: 0,
      isSpinning: false,
      soundEnabled: true,
      freeSpins: 0,
      currentResults: [null, null, null]
    };

    // ==================== AUDIO SYSTEM ====================

    const AudioSys = {
      ctx: null,

      init() {
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      },

      play(type) {
        if (!GameState.soundEnabled || !this.ctx) return;
        if (this.ctx.state === 'suspended') this.ctx.resume();

        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.connect(gain);
        gain.connect(this.ctx.destination);

        const now = this.ctx.currentTime;

        switch (type) {
          case 'spin':
            osc.frequency.setValueAtTime(200, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
            osc.start(now);
            osc.stop(now + 0.15);
            break;

          case 'stop':
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.exponentialRampToValueAtTime(100, now + 0.1);
            gain.gain.setValueAtTime(0.2, now);
            gain.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
            break;

          case 'win':
            // Arpeggio
            [440, 554, 659, 880].forEach((freq, i) => {
              const o = this.ctx.createOscillator();
              const g = this.ctx.createGain();
              o.connect(g);
              g.connect(this.ctx.destination);
              o.frequency.value = freq;
              g.gain.setValueAtTime(0.2, now + i * 0.1);
              g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.3);
              o.start(now + i * 0.1);
              o.stop(now + i * 0.1 + 0.3);
            });
            break;

          case 'bigwin':
            for (let i = 0; i < 5; i++) {
              setTimeout(() => this.play('win'), i * 200);
            }
            break;

          case 'jackpot':
            const notes = [440, 554, 659, 880, 1109, 1319, 1760];
            notes.forEach((freq, i) => {
              const o = this.ctx.createOscillator();
              const g = this.ctx.createGain();
              o.connect(g);
              g.connect(this.ctx.destination);
              o.frequency.value = freq;
              g.gain.setValueAtTime(0.3, now + i * 0.05);
              g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.05 + 0.2);
              o.start(now + i * 0.05);
              o.stop(now + i * 0.05 + 0.2);
            });
            break;
        }
      }
    };

    // ==================== INITIALIZATION ====================

    function init() {
      AudioSys.init();
      renderReelStrips();
      renderPaytable();
      updateDisplay();

      // Initialize reels with random positions
      for (let i = 0; i < 3; i++) {
        spinReelVisual(i, Math.floor(Math.random() * 20), 0);
      }
    }

    function renderReelStrips() {
      for (let reelIdx = 0; reelIdx < 3; reelIdx++) {
        const strip = document.getElementById(`reel${reelIdx + 1}`);
        strip.innerHTML = '';

        // Create extended strip for seamless looping
        const extendedStrip = [...REEL_STRIPS[reelIdx], ...REEL_STRIPS[reelIdx], ...REEL_STRIPS[reelIdx]];

        extendedStrip.forEach((symKey, pos) => {
          const symbol = SYMBOLS[symKey];
          const div = document.createElement('div');
          div.className = 'symbol';
          if (symbol.isWild) div.classList.add('wild');
          if (symbol.isScatter) div.classList.add('scatter');
          div.textContent = symbol.emoji;
          div.dataset.symbol = symKey;
          div.dataset.position = pos % 20;
          strip.appendChild(div);
        });
      }
    }

    function renderPaytable() {
      const grid = document.getElementById('paytableGrid');
      const symbolList = Object.values(SYMBOLS).filter(s => !s.isWild && !s.isScatter);

      grid.innerHTML = symbolList.map(s => `
                <div class="paytable-row">
                    <div class="paytable-symbol">${s.emoji}</div>
                    <div class="paytable-name">${s.name}</div>
                    <div class="paytable-odds">3× = ${s.value}x</div>
                </div>
            `).join('') + `
                <div class="paytable-row">
                    <div class="paytable-symbol">⭐</div>
                    <div class="paytable-name">Wild (Əvəz edir)</div>
                    <div class="paytable-odds">2x Multiplier</div>
                </div>
                <div class="paytable-row">
                    <div class="paytable-symbol">💰</div>
                    <div class="paytable-name">Scatter (Bonus)</div>
                    <div class="paytable-odds">3× = 10 Free Spin</div>
                </div>
            `;
    }

    // ==================== GAME LOGIC ====================

    function spinReelVisual(reelIdx, finalPosition, duration) {
      const strip = document.getElementById(`reel${reelIdx + 1}`);
      const symbolHeight = 200;
      const totalSymbols = 20;

      // Calculate position to show the target symbol in center
      // We need to account for the tripled strip
      const offset = (finalPosition + 20) * symbolHeight; // +20 for middle section

      strip.style.transition = duration > 0 ? `transform ${duration}ms cubic-bezier(0.25, 0.1, 0.25, 1)` : 'none';
      strip.style.transform = `translateY(-${offset}px)`;

      return finalPosition;
    }

    function generateResult() {
      // Real RNG - each reel stops at random position
      const results = [];
      for (let i = 0; i < 3; i++) {
        const position = Math.floor(Math.random() * 20);
        const symbolKey = REEL_STRIPS[i][position];
        results.push({
          position: position,
          symbol: SYMBOLS[symbolKey],
          key: symbolKey
        });
      }
      return results;
    }

    async function spin() {
      if (GameState.isSpinning) return;

      const cost = GameState.freeSpins > 0 ? 0 : GameState.bet;
      if (GameState.balance < cost) {
        alert('💳 Kifayət qədər balans yoxdur!\n"Kredit Əlavə Et" düyməsini basın.');
        return;
      }

      // Deduct bet
      if (GameState.freeSpins > 0) {
        GameState.freeSpins--;
      } else {
        GameState.balance -= cost;
      }

      GameState.isSpinning = true;
      GameState.totalSpins++;
      updateDisplay();

      // UI updates
      document.getElementById('spinBtn').disabled = true;
      document.getElementById('spinBtn').classList.add('spinning');
      hidePaylines();
      AudioSys.play('spin');

      // Generate result immediately (server-side logic)
      const results = generateResult();
      GameState.currentResults = results;

      // Animate reels with different durations
      const spinDurations = [2000, 2500, 3000];

      for (let i = 0; i < 3; i++) {
        setTimeout(() => {
          spinReelVisual(i, results[i].position, spinDurations[i]);
        }, i * 200);
      }

      // Wait for all reels to stop
      await new Promise(r => setTimeout(r, 3200));

      // Stop sound
      AudioSys.play('stop');

      // Calculate win
      const win = calculateWin(results);

      if (win.amount > 0) {
        await handleWin(win, results);
      }

      // Check scatters
      const scatters = results.filter(r => r.symbol.isScatter).length;
      if (scatters >= 3) {
        GameState.freeSpins += 10;
        showWinOverlay(0, '10 FREE SPINS!', 'scatter');
      }

      // Reset UI
      GameState.isSpinning = false;
      document.getElementById('spinBtn').disabled = false;
      document.getElementById('spinBtn').classList.remove('spinning');
      updateDisplay();
    }

    function calculateWin(results) {
      const [r1, r2, r3] = results;
      const symbols = [r1.symbol, r2.symbol, r3.symbol];

      let winAmount = 0;
      let winType = '';
      let multiplier = 1;

      // Count wilds
      const wildCount = symbols.filter(s => s.isWild).length;

      // Three of a kind (including wild substitutions)
      let matchedSymbol = null;

      if (r1.key === r2.key && r2.key === r3.key && !r1.symbol.isWild) {
        // Exact match
        matchedSymbol = r1.symbol;
      } else if (wildCount > 0) {
        // Wild substitution logic
        const nonWilds = symbols.filter(s => !s.isWild);
        if (nonWilds.length === 0) {
          // All wilds - count as highest value
          matchedSymbol = SYMBOLS.SEVEN;
          multiplier = 2;
        } else if (nonWilds.length === 1) {
          // Two wilds + one symbol = three of that symbol
          matchedSymbol = nonWilds[0];
          multiplier = 2;
        } else if (nonWilds.length === 2 && nonWilds[0].id === nonWilds[1].id) {
          // One wild + two matching = three of that symbol
          matchedSymbol = nonWilds[0];
          multiplier = 2;
        }
      }

      if (matchedSymbol && !matchedSymbol.isScatter) {
        winAmount = GameState.bet * matchedSymbol.value * multiplier;
        winType = matchedSymbol.type === 'jackpot' ? 'JACKPOT' :
          matchedSymbol.type === 'high' ? 'BIG_WIN' : 'WIN';
      }

      // Two cherries special payout
      if (winAmount === 0) {
        const cherryCount = symbols.filter(s => s.id === 'C').length;
        if (cherryCount >= 2) {
          winAmount = GameState.bet * 2;
          winType = 'WIN';
        }
      }

      // Random jackpot chance (0.1%)
      if (Math.random() < 0.001) {
        winAmount = GameState.balance * 10;
        winType = 'MEGA_JACKPOT';
      }

      return {
        amount: winAmount,
        type: winType,
        multiplier: multiplier,
        symbol: matchedSymbol
      };
    }

    async function handleWin(win, results) {
      GameState.balance += win.amount;
      GameState.lastWin = win.amount;
      GameState.totalWins++;

      // Show payline
      document.getElementById('paylineMiddle').classList.add('active');

      // Play sound
      if (win.type === 'MEGA_JACKPOT' || win.type === 'JACKPOT') {
        AudioSys.play('jackpot');
      } else if (win.type === 'BIG_WIN') {
        AudioSys.play('bigwin');
      } else {
        AudioSys.play('win');
      }

      // Animate credit counter
      animateCreditCounter(GameState.balance - win.amount, GameState.balance);

      // Show win overlay
      await new Promise(r => setTimeout(r, 500));
      showWinOverlay(win.amount, win.type, win.symbol);
    }

    function animateCreditCounter(start, end) {
      const el = document.getElementById('balanceDisplay');
      const duration = 1000;
      const startTime = performance.now();

      function update(currentTime) {
        const elapsed = currentTime - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const easeProgress = 1 - Math.pow(1 - progress, 3);
        const current = Math.floor(start + (end - start) * easeProgress);

        el.textContent = current.toLocaleString();
        el.classList.add('win');

        if (progress < 1) {
          requestAnimationFrame(update);
        } else {
          el.classList.remove('win');
        }
      }

      requestAnimationFrame(update);
    }

    function showWinOverlay(amount, type, symbol) {
      const overlay = document.getElementById('winOverlay');
      const title = document.getElementById('winTitle');
      const amt = document.getElementById('winAmount');
      const mult = document.getElementById('winMultiplier');

      const titles = {
        'MEGA_JACKPOT': '🎰 MEGA JACKPOT! 🎰',
        'JACKPOT': '💎 JACKPOT! 💎',
        'BIG_WIN': '🔥 BIG WIN! 🔥',
        'WIN': '✨ WIN! ✨',
        'scatter': '🎁 BONUS! 🎁'
      };

      title.textContent = titles[type] || 'WIN!';
      amt.textContent = amount > 0 ? '+' + amount.toLocaleString() : '';
      mult.textContent = symbol ? `${symbol.emoji} ${symbol.name}` : '';

      overlay.classList.add('show');
    }

    function closeWin() {
      document.getElementById('winOverlay').classList.remove('show');
      hidePaylines();
    }

    function hidePaylines() {
      document.querySelectorAll('.payline-indicator').forEach(p => p.classList.remove('active'));
    }

    // ==================== CONTROLS ====================

    function changeBet(direction) {
      if (GameState.isSpinning) return;

      const steps = [10, 25, 50, 100, 250, 500, 1000];
      const currentIdx = steps.indexOf(GameState.bet);
      const newIdx = currentIdx + direction;

      if (newIdx >= 0 && newIdx < steps.length) {
        setBet(steps[newIdx]);
      }
    }

    function setBet(amount) {
      if (GameState.isSpinning) return;
      if (amount > GameState.balance) amount = GameState.balance;
      if (amount < GameState.minBet) amount = GameState.minBet;

      GameState.bet = amount;
      updateDisplay();

      // Update active quick bet button
      document.querySelectorAll('.quick-bet').forEach(btn => {
        btn.classList.toggle('active', parseInt(btn.textContent) === amount ||
          (btn.textContent === 'MAX' && amount === GameState.maxBet));
      });
    }

    function togglePaytable() {
      document.getElementById('paytableModal').classList.toggle('show');
    }

    function toggleSound() {
      GameState.soundEnabled = !GameState.soundEnabled;
      event.target.textContent = GameState.soundEnabled ? '🔊 Səs' : '🔇 Səs';
    }

    function resetGame() {
      if (!confirm('Yeni oyun başlatmaq istəyirsiniz? Bütün balans sıfırlanacaq.')) return;

      GameState.balance = 1000;
      GameState.bet = 10;
      GameState.totalSpins = 0;
      GameState.totalWins = 0;
      GameState.lastWin = 0;
      GameState.freeSpins = 0;

      updateDisplay();
      hidePaylines();
    }

    function addCredits() {
      const amount = prompt('Əlavə etmək istədiyiniz məbləği daxil edin:', '1000');
      if (amount && !isNaN(amount) && amount > 0) {
        GameState.balance += parseInt(amount);
        updateDisplay();
      }
    }

    function updateDisplay() {
      document.getElementById('balanceDisplay').textContent = GameState.balance.toLocaleString();
      document.getElementById('betDisplay').textContent = GameState.bet;
      document.getElementById('currentBet').textContent = GameState.bet;
      document.getElementById('lastWinDisplay').textContent = GameState.lastWin.toLocaleString();
      document.getElementById('totalSpins').textContent = GameState.totalSpins;
      document.getElementById('totalWins').textContent = GameState.totalWins;

      // Update button states
      document.getElementById('btnMinus').disabled = GameState.bet <= GameState.minBet || GameState.isSpinning;
      document.getElementById('btnPlus').disabled = GameState.bet >= GameState.maxBet || GameState.bet >= GameState.balance || GameState.isSpinning;
    }

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space') {
        e.preventDefault();
        spin();
      } else if (e.code === 'ArrowUp') {
        changeBet(1);
      } else if (e.code === 'ArrowDown') {
        changeBet(-1);
      } else if (e.code === 'Escape') {
        closeWin();
        document.getElementById('paytableModal').classList.remove('show');
      }
    });

    // Start
    init();
  </script>
</body>
